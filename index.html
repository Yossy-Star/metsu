<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Password Sender</title>

  <style>
    body{
      font-family:sans-serif;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#111;
      color:white;
      margin:0;
      gap:16px;
    }

    input,
    select{
      padding:12px;
      width:260px;
      border:none;
      border-radius:8px;
      font-size:16px;
    }

    button{
      padding:12px 24px;
      border:none;
      border-radius:8px;
      font-size:16px;
      background:#00c853;
      color:white;
      cursor:pointer;
    }

    button:hover{ opacity:0.9; }

    #metsu-btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #c0392b;
      font-size: 28px;
      font-weight: bold;
      padding: 0;
    }

    #metsu-btn:hover{ opacity:0.9; }

    #status{
      font-size:14px;
      color:#aaa;
    }
  </style>
</head>
<body>

  <!-- パスワード -->
  <input
    type="password"
    id="passwordInput"
    placeholder="パスワードを入力"
  >

  <!-- コマンド選択 -->
  <select id="commandSelect">
    <option value="music1">音楽1</option>
    <option value="music2">音楽2</option>
    <option value="music3">音楽3</option>
    <option value="music4">音楽4</option>
    <option value="music5">音楽5</option>
    <option value="music6">音楽6</option>
    <option value="music7">音楽7</option>
    <option value="music8">音楽8</option>
    <option value="music9">音楽9</option>
  </select>

  <!-- 送信 -->
  <button id="sendBtn">送信</button>

  <!-- 滅ボタン -->
  <button id="metsu-btn">滅</button>

  <!-- 状態 -->
  <div id="status">待機中...</div>

  <!-- Firebase -->
  <script type="module">

    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInAnonymously }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, set }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCCXS7VkDZywh84EtS3AtTUfdvOmdKEyaM",
      authDomain: "musicar-c18e9.firebaseapp.com",
      databaseURL: "https://musicar-c18e9-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "musicar-c18e9",
      storageBucket: "musicar-c18e9.firebasestorage.app",
      messagingSenderId: "546300872409",
      appId: "1:546300872409:web:53b357be74d3e5a136e0c8"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);

    const statusEl = document.getElementById('status');

    async function sha256(message) {
      const msgBuffer  = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray  = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 共通送信関数
    async function sendCommand(command) {
      const password = document.getElementById('passwordInput').value;

      if (!password) {
        alert('パスワードを入力してください');
        return;
      }

      try {
        statusEl.textContent = '匿名ログイン中...';
        await signInAnonymously(auth);

        statusEl.textContent = 'ハッシュ化中...';
        const passwordHash = await sha256(password);

        statusEl.textContent = 'Firebase送信中...';
        await set(ref(db, 'main'), {
          command:      command,
          passwordHash: passwordHash,
          timestamp:    Date.now()
        });

        console.log('送信成功:', command);
        statusEl.textContent = '送信成功: ' + command;

      } catch (error) {
        console.error('エラー:', error);
        statusEl.textContent = '送信失敗';
        alert('送信失敗:\n' + error.message);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {

      // 通常送信ボタン
      document.getElementById('sendBtn')
        .addEventListener('click', () => {
          const command = document.getElementById('commandSelect').value;
          sendCommand(command);
        });

      // 滅ボタン（music9固定）
      document.getElementById('metsu-btn')
        .addEventListener('click', () => {
          sendCommand('music9');
        });

    });

  </script>

</body>
</html>
